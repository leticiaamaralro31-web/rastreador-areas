<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreador de Áreas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --green:#1D6A3E;--green-light:#E8F5EE;--green-mid:#2E8B57;
  --gray:#2E4057;--gray-light:#F5F6F8;--gray-mid:#6B7280;
  --border:#E5E7EB;--white:#fff;--red:#991B1B;--amber:#854F0B;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F2F5;color:#1a1a2e;min-height:100vh}
.topbar{background:var(--gray);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo{font-size:16px;font-weight:700;color:#fff}
.mode-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
.mode-badge.admin{background:#FEF3C7;color:#92400E}
.mode-badge.view{background:#D1FAE5;color:#065F46}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;color:#374151;transition:all .15s;text-decoration:none}
.btn:hover{background:#f9fafb}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:#165a34}
.btn.danger{color:var(--red);border-color:#FCA5A5}
.btn.danger:hover{background:#FEF2F2}
.btn.ghost{background:transparent;border-color:transparent;color:#fff}
.btn.ghost:hover{background:rgba(255,255,255,.1)}
.btn.sm{padding:5px 9px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.main{padding:20px;max-width:1100px;margin:0 auto}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.scard{background:#fff;border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow)}
.scard-label{font-size:11px;color:var(--gray-mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.scard-val{font-size:24px;font-weight:600}
.scard-val.green{color:#0F6E56}
.scard-val.amber{color:#854F0B}
.scard-val.purple{color:#534AB7}
.obras-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.obra-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border);transition:transform .15s}
.obra-card:hover{transform:translateY(-2px)}
.obra-card-top{background:var(--green);padding:16px}
.obra-card-nome{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.obra-card-meta{font-size:12px;color:rgba(255,255,255,.75);display:flex;gap:10px;flex-wrap:wrap}
.obra-card-body{padding:12px 16px}
.obra-card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.stat-box{background:#f9fafb;border-radius:8px;padding:8px;text-align:center}
.stat-val{font-size:16px;font-weight:600;color:#1a1a2e}
.stat-label{font-size:10px;color:var(--gray-mid);margin-top:2px}
.bar-bg{width:100%;background:#E5E7EB;border-radius:4px;height:6px;margin-bottom:12px}
.bar-fill{height:6px;border-radius:4px;background:var(--green);transition:width .4s}
.bar-fill.warn{background:#EF9F27}
.bar-fill.done{background:#534AB7}
.obra-card-actions{display:flex;gap:6px}
.add-card{background:#fff;border:2px dashed #d1d5db;border-radius:var(--radius);padding:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;color:#9ca3af;min-height:160px;transition:all .15s}
.add-card:hover{border-color:var(--green);color:var(--green);background:#f0fdf9}
.panel{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.panel-header{padding:16px 20px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.panel-title{font-size:16px;font-weight:600}
.panel-meta{font-size:12px;color:var(--gray-mid);margin-top:2px}
.obra-detail-header{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.obra-detail-title{font-size:22px;font-weight:700;color:var(--gray);margin-bottom:6px}
.obra-detail-meta{display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:var(--gray-mid);margin-bottom:14px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--gray-mid);margin-bottom:5px}
.progress-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}
.share-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.share-url{font-size:12px;color:#1D4ED8;word-break:break-all;flex:1}
.areas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.area-card{background:#fff;border-radius:var(--radius);padding:14px;border:1px solid var(--border);cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.area-card:hover{border-color:var(--green);transform:translateY(-1px)}
.area-card.active{border:2px solid var(--green);background:#f0fdf9}
.area-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.area-card-name{font-size:13px;font-weight:600}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-ok{background:#D1FAE5;color:#065F46}
.badge-warn{background:#FEF3C7;color:#92400E}
.badge-done{background:#EEEDFE;color:#534AB7}
.badge-new{background:#F3F4F6;color:#6B7280}
.area-card-meta{font-size:11px;color:var(--gray-mid);margin:3px 0}
.add-area-card{background:#fff;border:2px dashed #d1d5db;border-radius:var(--radius);padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:#9ca3af;min-height:100px;transition:all .15s;box-shadow:var(--shadow)}
.add-area-card:hover{border-color:var(--green);color:var(--green);background:#f0fdf9}
.detail-panel{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.detail-header{padding:14px 18px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.detail-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;padding:14px 18px;border-bottom:1px solid #f3f4f6}
.mini-card{background:#f9fafb;border-radius:8px;padding:10px 12px}
.mini-label{font-size:11px;color:var(--gray-mid);margin-bottom:3px}
.mini-val{font-size:17px;font-weight:600}
.mini-val.green{color:#0F6E56}
.mini-val.amber{color:#854F0B}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-weight:500;text-align:left;padding:9px 12px;color:var(--gray-mid);font-size:11px;background:#f9fafb;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #f9fafb;color:#1a1a2e}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.input-cell{background:none;border:none;border-bottom:1.5px solid #e5e7eb;width:80px;font-size:13px;color:#1a1a2e;padding:2px 4px;text-align:right;outline:none}
.input-cell:focus{border-bottom-color:var(--green)}
.fotos-section{padding:14px 18px;border-top:1px solid #f3f4f6;background:#fafafa}
.fotos-title{font-size:12px;font-weight:600;color:var(--gray-mid);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.fotos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.foto-col-label{font-size:11px;font-weight:600;color:var(--gray-mid);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.foto-col-label.antes{color:#92400E}
.foto-col-label.depois{color:#065F46}
.foto-items{display:flex;flex-wrap:wrap;gap:6px;min-height:60px}
.foto-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.foto-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.foto-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);border:none;border-radius:4px;color:#fff;cursor:pointer;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px}
.foto-add{width:72px;height:72px;border-radius:8px;border:2px dashed #d1d5db;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#9ca3af;font-size:10px;gap:2px;background:#fff;transition:all .15s}
.foto-add:hover{border-color:var(--green);color:var(--green)}
.foto-add i{font-size:20px}
.add-day-row{padding:10px 18px;border-top:1px solid #f3f4f6;display:flex;justify-content:flex-end}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:420px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px}
.field input,.field textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,107,62,.1)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;display:flex;align-items:center;justify-content:center}
.lightbox.hidden{display:none}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
.lightbox-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #e5e7eb;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{text-align:center;padding:60px 20px;color:var(--gray-mid);font-size:15px}
.empty-state{text-align:center;padding:32px;color:var(--gray-mid);font-size:13px}
.chart-card{background:#fff;border-radius:var(--radius);padding:18px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px}
.chart-wrap{position:relative;height:200px;margin-top:10px}
@media(max-width:600px){.fotos-grid{grid-template-columns:1fr}.main{padding:12px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo"><i class="ti ti-ruler-measure" style="vertical-align:-2px;margin-right:6px"></i>Rastreador de Áreas</div>
    <span class="mode-badge" id="mode-badge">...</span>
  </div>
  <div class="topbar-right" id="topbar-actions"></div>
</div>

<div class="main" id="main-content">
  <div class="loading-full"><span class="spinner"></span><br><br>Carregando...</div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="modal" id="modal-inner"></div>
</div>

<div class="lightbox hidden" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="ti ti-x"></i></button>
  <img id="lightbox-img" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SUPA = 'https://lnzfnuxtquvearoplegg.supabase.co';
const KEY  = 'sb_publishable_IcSssfeMM91SY1cvqkRZgw_HQWSaFu_';
const HDR  = {'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation'};

const params = new URLSearchParams(location.search);
const IS_ADMIN = params.get('admin') === '1';
const OBRA_ID  = params.get('obra') || null;

let obra=null, areas=[], dias=[], fotos=[], selectedAreaId=null, chartInst=null;
let saveTimers={};

async function api(method,path,body){
  const r=await fetch(SUPA+'/rest/v1/'+path,{method,headers:HDR,body:body?JSON.stringify(body):undefined});
  const t=await r.text();
  if(!r.ok) throw new Error(t);
  return t?JSON.parse(t):null;
}

async function uploadFoto(file){
  const ext=file.name.split('.').pop();
  const name=Date.now()+'.'+ext;
  const r=await fetch(`${SUPA}/storage/v1/object/fotos-escopo/${name}`,{
    method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':file.type},body:file
  });
  if(!r.ok) throw new Error(await r.text());
  return `${SUPA}/storage/v1/object/public/fotos-escopo/${name}`;
}

function fmtDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR');}catch{return d;}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function openModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('overlay').classList.remove('hidden');}
function closeModal(){document.getElementById('overlay').classList.add('hidden');}
function openLightbox(url){document.getElementById('lightbox-img').src=url;document.getElementById('lightbox').classList.remove('hidden');}
function closeLightbox(){document.getElementById('lightbox').classList.add('hidden');}

function getDias(areaId){return dias.filter(d=>d.area_id===areaId).sort((a,b)=>a.dia_num-b.dia_num);}
function getFotos(areaId,tipo){return fotos.filter(f=>f.area_id===areaId&&f.tipo===tipo);}
function totalFeito(areaId){return getDias(areaId).reduce((s,d)=>s+(parseFloat(d.feito)||0),0);}
function pctArea(area){if(!area.tamanho||area.tamanho<=0)return 0;return Math.min(100,(totalFeito(area.id)/area.tamanho)*100);}
function diasComDados(areaId){return getDias(areaId).filter(d=>parseFloat(d.feito)>0).length;}

// ---- OBRAS LIST ----
async function loadObrasList(){
  try{
    const all=await api('GET','obras_rastreador?select=*&order=created_at.desc');
    renderObrasList(all||[]);
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="loading-full" style="color:#991b1b">Erro: ${e.message}</div>`;
  }
}

function renderObrasList(obras){
  const tb=document.getElementById('topbar-actions');
  document.getElementById('mode-badge').textContent=IS_ADMIN?'🔧 Administrador':'👷 Técnico';
  document.getElementById('mode-badge').className='mode-badge '+(IS_ADMIN?'admin':'view');
  tb.innerHTML=IS_ADMIN?`<button class="btn ghost sm" onclick="createObra()"><i class="ti ti-plus"></i> Nova obra</button>`:'';

  const totalAreas=obras.reduce((s,o)=>s+(o.total_areas||0),0);

  let html=`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px">
      <div>
        <div style="font-size:20px;font-weight:700;color:var(--gray)"><i class="ti ti-building" style="vertical-align:-3px;margin-right:6px"></i>Obras — Rastreador de Áreas</div>
        <div style="font-size:13px;color:var(--gray-mid);margin-top:2px">${obras.length} obra${obras.length!==1?'s':''} cadastrada${obras.length!==1?'s':''}</div>
      </div>
      ${IS_ADMIN?`<button class="btn primary" onclick="createObra()"><i class="ti ti-plus"></i> Nova obra</button>`:''}
    </div>`;

  if(!obras.length){
    html+=`<div style="background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:48px 20px;text-align:center;color:var(--gray-mid)">
      <i class="ti ti-ruler-measure" style="font-size:48px"></i>
      <div style="font-size:16px;font-weight:600;margin:12px 0 6px">Nenhuma obra cadastrada</div>
      ${IS_ADMIN?`<button class="btn primary" style="margin-top:8px" onclick="createObra()"><i class="ti ti-plus"></i> Criar primeira obra</button>`:''}
    </div>`;
  } else {
    html+=`<div class="obras-grid">`;
    obras.forEach(o=>{
      const adminUrl=location.origin+location.pathname+'?obra='+o.id+'&admin=1';
      const techUrl=location.origin+location.pathname+'?obra='+o.id;
      html+=`<div class="obra-card">
        <div class="obra-card-top">
          <div class="obra-card-nome">${o.nome}</div>
          <div class="obra-card-meta">
            ${o.local?`<span><i class="ti ti-map-pin" style="font-size:11px"></i> ${o.local}</span>`:''}
            ${o.responsavel?`<span><i class="ti ti-user" style="font-size:11px"></i> ${o.responsavel}</span>`:''}
            ${o.data_inicio?`<span><i class="ti ti-calendar" style="font-size:11px"></i> ${fmtDate(o.data_inicio)}</span>`:''}
          </div>
        </div>
        <div class="obra-card-body">
          <div class="obra-card-actions">
            <a href="${IS_ADMIN?adminUrl:techUrl}" class="btn primary sm" style="flex:1;justify-content:center"><i class="ti ti-arrow-right"></i> Abrir obra</a>
            ${IS_ADMIN?`
            <button class="btn sm" onclick="copyText('${techUrl}','Link copiado!')" title="Copiar link técnico"><i class="ti ti-share"></i></button>
            <button class="btn sm danger" onclick="deleteObra('${o.id}','${o.nome.replace(/'/g,'')}')"><i class="ti ti-trash"></i></button>`:''}
          </div>
        </div>
      </div>`;
    });
    html+=`<div class="add-card" onclick="createObra()"><i class="ti ti-plus" style="font-size:24px"></i> Nova obra</div>`;
    html+=`</div>`;
  }
  document.getElementById('main-content').innerHTML=html;
}

async function deleteObra(id,nome){
  if(!confirm(`Excluir a obra "${nome}" e todos os dados?`)) return;
  try{
    await api('DELETE','obras_rastreador?id=eq.'+id);
    showToast('Obra excluída');
    loadObrasList();
  }catch(e){showToast('Erro: '+e.message);}
}

function copyText(txt,msg){
  navigator.clipboard.writeText(txt).then(()=>showToast(msg)).catch(()=>showToast('Copie: '+txt));
}

// ---- OBRA DETAIL ----
async function loadObra(){
  try{
    const [o,a,d,f]=await Promise.all([
      api('GET',`obras_rastreador?id=eq.${OBRA_ID}&select=*`),
      api('GET',`areas_rastreador?obra_id=eq.${OBRA_ID}&select=*&order=ordem.asc`),
      api('GET',`dias_rastreador?select=*,areas_rastreador!inner(obra_id)&areas_rastreador.obra_id=eq.${OBRA_ID}&order=dia_num.asc`),
      api('GET',`fotos_rastreador?select=*,areas_rastreador!inner(obra_id)&areas_rastreador.obra_id=eq.${OBRA_ID}&order=created_at.asc`)
    ]);
    obra=o?.[0]||null; areas=a||[]; dias=d||[]; fotos=f||[];
    renderObra();
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="loading-full" style="color:#991b1b">Erro: ${e.message}</div>`;
  }
}

function renderObra(){
  const tb=document.getElementById('topbar-actions');
  document.getElementById('mode-badge').textContent=IS_ADMIN?'🔧 Administrador':'👷 Técnico';
  document.getElementById('mode-badge').className='mode-badge '+(IS_ADMIN?'admin':'view');
  const backBtn=`<a href="${location.pathname}${IS_ADMIN?'?admin=1':''}" class="btn ghost sm"><i class="ti ti-arrow-left"></i> Obras</a>`;
  tb.innerHTML=IS_ADMIN
    ? backBtn+`<button class="btn ghost sm" onclick="shareLink()"><i class="ti ti-share"></i> Link técnico</button>
               <button class="btn ghost sm" onclick="editObra()"><i class="ti ti-edit"></i> Editar</button>
               <button class="btn ghost sm" onclick="addArea()"><i class="ti ti-plus"></i> Nova área</button>`
    : backBtn+`<span style="color:#ccc;font-size:12px">Modo somente leitura</span>`;

  if(!obra){document.getElementById('main-content').innerHTML=`<div class="loading-full" style="color:#991b1b">Obra não encontrada.</div>`;return;}

  const totalM2=areas.reduce((s,a)=>s+totalFeito(a.id),0);
  const totalMeta=areas.reduce((s,a)=>s+(parseFloat(a.tamanho)||0),0);
  const pctGeral=totalMeta>0?Math.min(100,(totalM2/totalMeta)*100):0;

  let html=`<div class="obra-detail-header">
    <div class="obra-detail-title">${obra.nome}</div>
    <div class="obra-detail-meta">
      ${obra.local?`<span><i class="ti ti-map-pin"></i> ${obra.local}</span>`:''}
      ${obra.responsavel?`<span><i class="ti ti-user"></i> ${obra.responsavel}</span>`:''}
      ${obra.data_inicio?`<span><i class="ti ti-calendar"></i> ${fmtDate(obra.data_inicio)}</span>`:''}
    </div>
    <div class="summary-grid">
      <div class="scard"><div class="scard-label">Áreas</div><div class="scard-val">${areas.length}</div></div>
      <div class="scard"><div class="scard-label">Total feito</div><div class="scard-val green">${totalM2.toLocaleString('pt-BR')} m²</div></div>
      <div class="scard"><div class="scard-label">Meta total</div><div class="scard-val">${totalMeta.toLocaleString('pt-BR')} m²</div></div>
      <div class="scard"><div class="scard-label">Progresso</div><div class="scard-val ${pctGeral>=50?'green':'amber'}">${pctGeral.toFixed(1)}%</div></div>
    </div>
    <div style="margin-top:12px">
      <div class="progress-label"><span>${totalM2.toLocaleString('pt-BR')} m² de ${totalMeta.toLocaleString('pt-BR')} m²</span><span style="font-weight:600">${pctGeral.toFixed(1)}%</span></div>
      <div class="progress-bar"><div class="progress-fill${pctGeral>=100?' done':pctGeral>=50?'':' warn'}" style="width:${pctGeral.toFixed(0)}%"></div></div>
    </div>
    ${IS_ADMIN?`<div style="margin-top:12px">
      <div style="font-size:12px;font-weight:600;color:var(--gray-mid);margin-bottom:6px">🔗 Link técnicos:</div>
      <div class="share-box">
        <span class="share-url">${location.origin}${location.pathname}?obra=${obra.id}</span>
        <button class="btn sm primary" onclick="copyText('${location.origin}${location.pathname}?obra=${obra.id}','Link copiado!')"><i class="ti ti-copy"></i> Copiar</button>
      </div>
    </div>`:''}
  </div>`;

  // Chart
  if(areas.length){
    html+=`<div class="chart-card"><div style="font-size:12px;font-weight:600;color:var(--gray-mid);text-transform:uppercase;letter-spacing:.04em">Progresso por área</div><div class="chart-wrap"><canvas id="area-chart" role="img" aria-label="Progresso por área"></canvas></div></div>`;
  }

  // Areas grid
  html+=`<div style="font-size:12px;font-weight:600;color:var(--gray-mid);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Áreas cadastradas</div>`;
  html+=`<div class="areas-grid">`;
  areas.forEach(a=>{
    const p=pctArea(a);
    const barC=p>=100?' done':p>=50?'':' warn';
    const badge=p>=100?'<span class="badge badge-done">Concluída</span>':p>0?'<span class="badge badge-warn">Em andamento</span>':'<span class="badge badge-new">Não iniciada</span>';
    html+=`<div class="area-card ${selectedAreaId===a.id?'active':''}" onclick="selectArea('${a.id}')">
      <div class="area-card-top"><div class="area-card-name">${a.nome}</div>${badge}</div>
      <div class="area-card-meta">${(a.tamanho||0).toLocaleString('pt-BR')} m² · ${a.estimado||'?'} dias est.</div>
      <div class="area-card-meta" style="color:#0F6E56;font-weight:500">${totalFeito(a.id).toLocaleString('pt-BR')} m² feitos</div>
      <div class="bar-bg" style="margin-top:6px"><div class="bar-fill${barC}" style="width:${Math.min(100,p).toFixed(0)}%"></div></div>
      <div style="font-size:11px;color:#9ca3af;margin-top:3px">${p.toFixed(1)}%</div>
    </div>`;
  });
  if(IS_ADMIN) html+=`<div class="add-area-card" onclick="addArea()"><i class="ti ti-plus" style="font-size:20px"></i> Nova área</div>`;
  html+=`</div>`;

  // Selected area detail
  if(selectedAreaId){
    const area=areas.find(a=>a.id===selectedAreaId);
    if(area) html+=renderAreaDetail(area);
  }

  document.getElementById('main-content').innerHTML=html;

  // Init chart
  if(areas.length){
    const sorted=[...areas].sort((a,b)=>pctArea(b)-pctArea(a));
    const labels=sorted.map(a=>a.nome.length>14?a.nome.slice(0,13)+'…':a.nome);
    const data=sorted.map(a=>parseFloat(pctArea(a).toFixed(1)));
    const colors=data.map(v=>v>=100?'#534AB7':v>=50?'#1D9E75':'#EF9F27');
    if(chartInst){chartInst.destroy();chartInst=null;}
    chartInst=new Chart(document.getElementById('area-chart'),{
      type:'bar',
      data:{labels,datasets:[{label:'% concluída',data,backgroundColor:colors,borderRadius:5,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'%'}}},
        scales:{x:{ticks:{color:'#9ca3af',font:{size:11}},grid:{display:false}},
          y:{min:0,max:100,ticks:{color:'#9ca3af',font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,.05)'}}}}
    });
  }
}

function renderAreaDetail(area){
  const p=pctArea(area);
  const feito=totalFeito(area.id);
  const dc=diasComDados(area.id);
  const areaDias=getDias(area.id);
  const barC=p>=100?' done':p>=50?'':' warn';

  let rows=areaDias.map((d,i)=>{
    const fd=parseFloat(d.feito)||0;
    const acum=areaDias.slice(0,i+1).reduce((s,x)=>s+(parseFloat(x.feito)||0),0);
    const pctD=area.tamanho>0&&fd>0?(fd/area.tamanho*100).toFixed(1):'—';
    const pctA=area.tamanho>0&&acum>0?(acum/area.tamanho*100).toFixed(1):'—';
    const bc=pctD==='—'?'badge-new':parseFloat(pctD)>=10?'badge-ok':'badge-warn';
    return `<tr>
      <td style="font-weight:600">Dia ${d.dia_num}</td>
      <td style="color:#6b7280">${area.estimado||'—'} dias</td>
      <td><input class="input-cell" type="number" min="0" placeholder="0" value="${d.feito||''}" oninput="scheduleUpdateDia('${d.id}','${area.id}',this.value)"></td>
      <td>${acum>0?acum.toLocaleString('pt-BR'):'—'}</td>
      <td><span class="badge ${bc}">${pctD!=='—'?pctD+'%':'—'}</span></td>
      <td style="font-weight:500;color:${pctA!=='—'?'#0F6E56':'#9ca3af'}">${pctA!=='—'?pctA+'%':'—'}</td>
      <td style="color:#6b7280">${i<dc?dc+' dia(s)':'—'}</td>
      ${IS_ADMIN?`<td><button class="btn sm danger" onclick="removeDia('${d.id}','${area.id}')"><i class="ti ti-x"></i></button></td>`:'<td></td>'}
    </tr>`;
  }).join('');

  const ftAntes=getFotos(area.id,'antes');
  const ftDepois=getFotos(area.id,'depois');

  return `<div style="font-size:12px;font-weight:600;color:var(--gray-mid);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Detalhes — ${area.nome}</div>
  <div class="detail-panel">
    <div class="detail-header">
      <div>
        <div style="font-size:15px;font-weight:600">${area.nome}</div>
        <div style="font-size:12px;color:var(--gray-mid);margin-top:2px">${area.tamanho?(area.tamanho.toLocaleString('pt-BR')+' m² total'):''} ${area.estimado?' · '+area.estimado+' dias estimados':''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${IS_ADMIN?`<button class="btn sm primary" onclick="addDia('${area.id}')"><i class="ti ti-plus"></i> Dia</button>
        <button class="btn sm" onclick="editArea('${area.id}')"><i class="ti ti-edit"></i></button>
        <button class="btn sm danger" onclick="deleteArea('${area.id}')"><i class="ti ti-trash"></i></button>`:''}
      </div>
    </div>
    <div class="detail-stats">
      <div class="mini-card"><div class="mini-label">Feito</div><div class="mini-val green">${feito.toLocaleString('pt-BR')} m²</div></div>
      <div class="mini-card"><div class="mini-label">Restante</div><div class="mini-val">${Math.max(0,(area.tamanho||0)-feito).toLocaleString('pt-BR')} m²</div></div>
      <div class="mini-card"><div class="mini-label">Progresso</div><div class="mini-val ${p>=50?'green':'amber'}">${p.toFixed(1)}%</div></div>
      <div class="mini-card"><div class="mini-label">Dias c/ dados</div><div class="mini-val">${dc}</div></div>
    </div>
    <div style="padding:10px 18px;border-bottom:1px solid #f3f4f6">
      <div class="bar-bg" style="height:8px"><div class="bar-fill${barC}" style="width:${Math.min(100,p).toFixed(0)}%"></div></div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Dia</th><th>T. estimado</th><th>Área feita (m²)</th><th>Acumulada (m²)</th><th>% do dia</th><th>% acumulada</th><th>T. real acum.</th><th></th></tr></thead>
        <tbody>${rows||`<tr><td colspan="8" class="empty-state">Clique em "+ Dia" para começar</td></tr>`}</tbody>
      </table>
    </div>
    <div class="fotos-section">
      <div class="fotos-title"><i class="ti ti-camera"></i> Registro fotográfico</div>
      <div class="fotos-grid">
        <div>
          <div class="foto-col-label antes"><i class="ti ti-clock"></i> Antes</div>
          <div class="foto-items" id="fotos-antes-${area.id}">
            ${ftAntes.map(f=>`<div class="foto-thumb"><img src="${f.url}" onclick="openLightbox('${f.url}')" loading="lazy">${IS_ADMIN?`<button class="foto-del" onclick="deleteFoto('${f.id}','${area.id}','antes')"><i class="ti ti-x" style="font-size:9px"></i></button>`:''}</div>`).join('')}
            ${IS_ADMIN?`<label class="foto-add"><input type="file" accept="image/*" style="display:none" onchange="handleFoto(this,'${area.id}','antes')"><i class="ti ti-plus"></i><span>Antes</span></label>`:''}
          </div>
        </div>
        <div>
          <div class="foto-col-label depois"><i class="ti ti-check"></i> Depois</div>
          <div class="foto-items" id="fotos-depois-${area.id}">
            ${ftDepois.map(f=>`<div class="foto-thumb"><img src="${f.url}" onclick="openLightbox('${f.url}')" loading="lazy">${IS_ADMIN?`<button class="foto-del" onclick="deleteFoto('${f.id}','${area.id}','depois')"><i class="ti ti-x" style="font-size:9px"></i></button>`:''}</div>`).join('')}
            ${IS_ADMIN?`<label class="foto-add"><input type="file" accept="image/*" style="display:none" onchange="handleFoto(this,'${area.id}','depois')"><i class="ti ti-plus"></i><span>Depois</span></label>`:''}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function selectArea(id){
  selectedAreaId=selectedAreaId===id?null:id;
  renderObra();
  if(selectedAreaId) setTimeout(()=>{const p=document.querySelector('.detail-panel');if(p)p.scrollIntoView({behavior:'smooth',block:'start'});},60);
}

function scheduleUpdateDia(diaId,areaId,val){
  const d=dias.find(x=>x.id===diaId);
  if(d) d.feito=val;
  clearTimeout(saveTimers[diaId]);
  saveTimers[diaId]=setTimeout(async()=>{
    try{await api('PATCH',`dias_rastreador?id=eq.${diaId}`,{feito:parseFloat(val)||0});}
    catch(e){showToast('Erro ao salvar: '+e.message);}
  },800);
  // Update totals without full re-render
  const area=areas.find(a=>a.id===areaId);
  if(area){
    const p=pctArea(area);
    const card=document.querySelector(`[onclick="selectArea('${areaId}')"]`);
    if(card){
      const bar=card.querySelector('.bar-fill');
      const pctEl=card.querySelector('div[style*="color:#9ca3af"]');
      const feitoEl=card.querySelectorAll('.area-card-meta')[1];
      if(bar) bar.style.width=Math.min(100,p).toFixed(0)+'%';
      if(pctEl) pctEl.textContent=p.toFixed(1)+'%';
      if(feitoEl) feitoEl.textContent=totalFeito(areaId).toLocaleString('pt-BR')+' m² feitos';
    }
  }
}

async function addDia(areaId){
  const areaDias=getDias(areaId);
  const nextNum=(areaDias.length>0?Math.max(...areaDias.map(d=>d.dia_num)):0)+1;
  try{
    const [novo]=await api('POST','dias_rastreador',{area_id:areaId,dia_num:nextNum,feito:0});
    dias.push(novo);
    renderObra();
    showToast('Dia '+nextNum+' adicionado');
    setTimeout(()=>{const p=document.querySelector('.detail-panel');if(p)p.scrollIntoView({behavior:'smooth',block:'start'});},60);
  }catch(e){showToast('Erro: '+e.message);}
}

async function removeDia(diaId,areaId){
  try{
    await api('DELETE','dias_rastreador?id=eq.'+diaId);
    dias=dias.filter(d=>d.id!==diaId);
    const areaDias=getDias(areaId).sort((a,b)=>a.dia_num-b.dia_num);
    areaDias.forEach((d,i)=>{d.dia_num=i+1;api('PATCH','dias_rastreador?id=eq.'+d.id,{dia_num:i+1});});
    renderObra();
  }catch(e){showToast('Erro: '+e.message);}
}

async function deleteArea(id){
  if(!confirm('Excluir esta área e todos os dados?')) return;
  try{
    await api('DELETE','areas_rastreador?id=eq.'+id);
    areas=areas.filter(a=>a.id!==id);
    dias=dias.filter(d=>d.area_id!==id);
    fotos=fotos.filter(f=>f.area_id!==id);
    if(selectedAreaId===id) selectedAreaId=null;
    renderObra();
    showToast('Área removida');
  }catch(e){showToast('Erro: '+e.message);}
}

async function handleFoto(input,areaId,tipo){
  const file=input.files[0];
  if(!file) return;
  showToast('Enviando foto...');
  try{
    const url=await uploadFoto(file);
    const [nova]=await api('POST','fotos_rastreador',{area_id:areaId,tipo,url});
    fotos.push(nova);
    const container=document.getElementById(`fotos-${tipo}-${areaId}`);
    const addBtn=container.querySelector('label.foto-add');
    const div=document.createElement('div');
    div.className='foto-thumb';
    div.innerHTML=`<img src="${nova.url}" onclick="openLightbox('${nova.url}')" loading="lazy"><button class="foto-del" onclick="deleteFoto('${nova.id}','${areaId}','${tipo}')"><i class="ti ti-x" style="font-size:9px"></i></button>`;
    container.insertBefore(div,addBtn);
    showToast('Foto adicionada!');
  }catch(e){showToast('Erro: '+e.message);}
  input.value='';
}

async function deleteFoto(id,areaId,tipo){
  if(!confirm('Remover foto?')) return;
  try{
    await api('DELETE','fotos_rastreador?id=eq.'+id);
    fotos=fotos.filter(f=>f.id!==id);
    renderObra();
  }catch(e){showToast('Erro: '+e.message);}
}

// ---- MODALS ----
function createObra(){
  openModal(`<h3>Nova obra</h3>
    <div class="field"><label>Nome *</label><input id="c-nome" placeholder="Ex: Condomínio Sol Nascente"></div>
    <div class="field"><label>Local</label><input id="c-local" placeholder="Ex: Americana, SP"></div>
    <div class="field"><label>Responsável</label><input id="c-resp" placeholder="Nome do responsável"></div>
    <div class="field"><label>Data de início</label><input type="date" id="c-data"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="doCreateObra()"><i class="ti ti-check"></i> Criar</button></div>`);
  setTimeout(()=>document.getElementById('c-nome').focus(),50);
}

async function doCreateObra(){
  const nome=document.getElementById('c-nome').value.trim();
  if(!nome) return;
  try{
    const [nova]=await api('POST','obras_rastreador',{nome,local:document.getElementById('c-local').value,responsavel:document.getElementById('c-resp').value,data_inicio:document.getElementById('c-data').value||null});
    closeModal();
    location.href=location.pathname+'?obra='+nova.id+(IS_ADMIN?'&admin=1':'');
  }catch(e){showToast('Erro: '+e.message);}
}

function editObra(){
  openModal(`<h3>Editar obra</h3>
    <div class="field"><label>Nome</label><input id="e-nome" value="${obra.nome}"></div>
    <div class="field"><label>Local</label><input id="e-local" value="${obra.local||''}"></div>
    <div class="field"><label>Responsável</label><input id="e-resp" value="${obra.responsavel||''}"></div>
    <div class="field"><label>Data de início</label><input type="date" id="e-data" value="${obra.data_inicio||''}"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveEditObra()"><i class="ti ti-check"></i> Salvar</button></div>`);
}

async function saveEditObra(){
  const body={nome:document.getElementById('e-nome').value.trim(),local:document.getElementById('e-local').value,responsavel:document.getElementById('e-resp').value,data_inicio:document.getElementById('e-data').value||null};
  try{
    await api('PATCH','obras_rastreador?id=eq.'+obra.id,body);
    Object.assign(obra,body);
    closeModal();renderObra();showToast('Obra atualizada');
  }catch(e){showToast('Erro: '+e.message);}
}

function addArea(){
  openModal(`<h3>Nova área</h3>
    <div class="field"><label>Nome *</label><input id="a-nome" placeholder="Ex: Bloco A, Fundação..."></div>
    <div class="field"><label>Tamanho total (m²)</label><input type="number" id="a-tam" placeholder="Ex: 1200"></div>
    <div class="field"><label>Tempo estimado (dias)</label><input type="number" id="a-est" placeholder="Ex: 10"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveAddArea()"><i class="ti ti-check"></i> Criar</button></div>`);
  setTimeout(()=>document.getElementById('a-nome').focus(),50);
}

async function saveAddArea(){
  const nome=document.getElementById('a-nome').value.trim();
  if(!nome) return;
  try{
    const [nova]=await api('POST','areas_rastreador',{obra_id:obra.id,nome,tamanho:parseFloat(document.getElementById('a-tam').value)||0,estimado:parseFloat(document.getElementById('a-est').value)||0,ordem:areas.length});
    areas.push(nova);
    closeModal();renderObra();showToast('Área criada');
  }catch(e){showToast('Erro: '+e.message);}
}

function editArea(id){
  const area=areas.find(a=>a.id===id);
  if(!area) return;
  openModal(`<h3>Editar área</h3>
    <div class="field"><label>Nome</label><input id="ea-nome" value="${area.nome}"></div>
    <div class="field"><label>Tamanho total (m²)</label><input type="number" id="ea-tam" value="${area.tamanho||''}"></div>
    <div class="field"><label>Tempo estimado (dias)</label><input type="number" id="ea-est" value="${area.estimado||''}"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveEditArea('${id}')"><i class="ti ti-check"></i> Salvar</button></div>`);
}

async function saveEditArea(id){
  const area=areas.find(a=>a.id===id);
  if(!area) return;
  const body={nome:document.getElementById('ea-nome').value.trim()||area.nome,tamanho:parseFloat(document.getElementById('ea-tam').value)||0,estimado:parseFloat(document.getElementById('ea-est').value)||0};
  try{
    await api('PATCH','areas_rastreador?id=eq.'+id,body);
    Object.assign(area,body);
    closeModal();renderObra();showToast('Área atualizada');
  }catch(e){showToast('Erro: '+e.message);}
}

function shareLink(){
  const url=location.origin+location.pathname+'?obra='+obra.id;
  openModal(`<h3><i class="ti ti-share" style="vertical-align:-2px;margin-right:6px"></i>Link técnicos</h3>
    <p style="font-size:13px;color:var(--gray-mid);margin-bottom:12px">Compartilhe — técnicos podem registrar dados mas não editar a estrutura.</p>
    <div style="background:#F0FDF4;border:1px solid #A7F3D0;border-radius:8px;padding:10px 12px;font-size:12px;word-break:break-all;color:#065F46;margin-bottom:12px">${url}</div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Fechar</button><button class="btn primary" onclick="copyText('${url}','Copiado!')"><i class="ti ti-copy"></i> Copiar</button></div>`);
}

// ---- INIT ----
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

async function init(){
  document.getElementById('mode-badge').textContent=IS_ADMIN?'🔧 Administrador':'👷 Técnico';
  document.getElementById('mode-badge').className='mode-badge '+(IS_ADMIN?'admin':'view');
  if(!OBRA_ID){ loadObrasList(); return; }
  await loadObra();
}

init();
</script>
</body>
</html>
